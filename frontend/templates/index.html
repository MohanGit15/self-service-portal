<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Service Enterprise Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4 text-center">Self-Service IT Portal</h1>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-primary text-white">⚙️ Environment Booking System</div>
                    <div class="card-body">
                        <form id="bookingForm">
                            <div class="mb-2"><input type="text" id="bk_requester" class="form-control" placeholder="Requester Name" required></div>
                            <div class="mb-2">
                                <select id="bk_env" class="form-select" onchange="calculateLiveCost()" required>
                                    <option value="">Select Environment...</option>
                                    <option value="DEVE">DEVE (₹20k/day)</option>
                                    <option value="DEVD">DEVD (₹20k/day)</option>
                                    <option value="DEVF">DEVF (₹20k/day)</option>
                                    <option value="EBS01">EBS01 (₹15k/day)</option>
                                    <option value="EBS02">EBS02 (₹15k/day)</option>
                                    <option value="EBS03">EBS03 (₹15k/day)</option>
                                    <option value="DTESF">DTESF (₹15k/day)</option>
                                    <option value="EBS06">EBS06 (₹15k/day)</option>
                                </select>
                            </div>
                            <div class="mb-2"><input type="date" id="bk_start" class="form-control" onchange="calculateLiveCost()" required></div>
                            <div class="mb-2"><input type="date" id="bk_end" class="form-control" onchange="calculateLiveCost()" required></div>
                            <div class="mb-2"><input type="text" id="bk_summary" class="form-control" placeholder="Short Summary"></div>
                            <div class="mb-2"><textarea id="bk_desc" class="form-control" placeholder="Detailed Description"></textarea></div>
                            
                            <div class="alert alert-warning py-2 mt-2 font-monospace">Estimated Total Cost: <span id="costDisplay">₹0</span></div>
                            <button type="submit" class="btn btn-primary w-100">Submit Booking</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-secondary text-white">❓ Raise General Request (Unsure)</div>
                    <div class="card-body">
                        <form id="raiseForm">
                            <div class="mb-2"><input type="text" id="rf_requester" class="form-control" placeholder="Requester Name" required></div>
                            <div class="mb-2"><input type="date" id="rf_start" class="form-control" required></div>
                            <div class="mb-2"><input type="date" id="rf_end" class="form-control" required></div>
                            <div class="mb-3"><textarea id="rf_desc" class="form-control" rows="4" placeholder="Describe what you need setup..." required></textarea></div>
                            <button type="submit" class="btn btn-secondary w-100">Submit Request</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function calculateLiveCost() {
            const env = document.getElementById('bk_env').value;
            const start = document.getElementById('bk_start').value;
            const end = document.getElementById('bk_end').value;
            if(!env || !start || !end) return;

            const res = await fetch('/api/booking/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ environment: env, start_date: start, end_date: end })
            });
            const data = await res.json();
            if(data.total_cost) document.getElementById('costDisplay').innerText = '₹' + data.total_cost.toLocaleString('en-IN');
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                requester: document.getElementById('bk_requester').value,
                environment: document.getElementById('bk_env').value,
                start_date: document.getElementById('bk_start').value,
                end_date: document.getElementById('bk_end').value,
                summary: document.getElementById('bk_summary').value,
                description: document.getElementById('bk_desc').value
            };
            const res = await fetch('/api/booking', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) alert('Booking Captured Successfully!');
        });

        document.getElementById('raiseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                requester: document.getElementById('rf_requester').value,
                start_date: document.getElementById('rf_start').value,
                end_date: document.getElementById('rf_end').value,
                description: document.getElementById('rf_desc').value
            };
            const res = await fetch('/api/raise-request', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) alert('General Ticket Escalated!');
        });
    </script>
</body>
</html>
