apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfservice-frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: custom-registry/portal-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-env-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: env-booking
  template:
    metadata:
      labels:
        app: env-booking
    spec:
      containers:
      - name: env-booking
        image: custom-registry/service-env-booking:latest
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: booking-svc
spec:
  ports:
  - port: 80
    targetPort: 5001
  selector:
    app: env-booking
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port:
              number: 80
      - path: /api/booking
        pathType: Prefix
        backend:
          service:
            name: booking-svc
            port:
              number: 80